<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamant Nails - Officiële Webshop</title>
    <style>
        /* Basis instellingen */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcf8f9; /* Zacht roze/witte achtergrond */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Container voor de inhoud */
        .container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #d4a373; /* Goud-achtige kleur voor een luxe uitstraling */
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* De opvallende knop */
        .btn-shop {
            display: inline-block;
            background-color: #d4a373;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 4px 15px rgba(212, 163, 115, 0.4);
        }

        /* Effect als je over de knop hovert */
        .btn-shop:hover {
            background-color: #bc8a5f;
            transform: scale(1.05);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Diamant Nails</h1>
        <p>Ontdek onze exclusieve collectie in de webshop. Voor de perfecte nagels en professionele producten.</p>
        
        <a href="https://www.diamant-nails.nl/webshop-c-z" class="btn-shop">BEZOEK DE WEBSHOP</a>

        <div class="footer">
            © 2024 Diamant Nails - Altijd de beste kwaliteit
        </div>
    </div>

</body>
</html>
